<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dental Core - المواد الدراسية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; margin: 10px 0; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 20px; background: #27ae60; color: white; text-decoration: none; border-radius: 6px; }
        h1 { text-align: center; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dental Core - المحاضرات</h1>
    <div id="materialsList">جاري تحميل المواد...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlIsEjPuyyp0VKgNffgu5StvSizata6Lo",
      projectId: "dental-core-2242b",
      // تأكد أنك وضعت باقي بياناتك هنا
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadMaterials() {
        const listDiv = document.getElementById('materialsList');
        listDiv.innerHTML = ""; // مسح النص القديم
        
        const querySnapshot = await getDocs(collection(db, "materials"));
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <h3>${data.subject}</h3>
                    <p>السنة: ${data.year}</p>
                </div>
                <a href="${data.link}" target="_blank" class="btn">تحميل المادة</a>
            `;
            listDiv.appendChild(card);
        });
    }

    loadMaterials();
</script>

</body>
</html>
