<!-- index.html -->
<div id="content">
    <select id="studentYear" onchange="filterData()">
        <option value="Year1">سنة أولى</option>
        <!-- باقي السنين -->
    </select>
    <div id="materialList"></div> <!-- هنا هتظهر المحاضرات -->
</div>

<script>
    async function showMaterials() {
        const q = query(collection(db, "DentalCore_Materials"), 
            where("year", "==", document.getElementById('studentYear').value));
        const snapshot = await getDocs(q);
        snapshot.forEach(doc => {
            const m = doc.data();
            document.getElementById('materialList').innerHTML += 
                `<a href="${m.url}">${m.subject} - ${m.type} ${m.number}</a><br>`;
        });
    }
</script>
