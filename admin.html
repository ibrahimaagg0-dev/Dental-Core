<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dental Core - Admin Panel</title>
</head>
<body>
    <select id="year" onchange="loadSubjects()">
        <option value="">اختر السنة</option>
        <option value="Year1">السنة الأولى</option>
        <option value="Year2">السنة الثانية</option>
        <option value="Year3">السنة الثالثة</option>
        <option value="Year4">السنة الرابعة</option>
        <option value="Year5">السنة الخامسة</option>
    </select>
    <select id="sem" onchange="loadSubjects()">
        <option value="Sem1">الترم الأول</option>
        <option value="Sem2">الترم الثاني</option>
    </select>
    <select id="subject"></select>
    <input type="text" id="desc" placeholder="وصف المحتوى">
    <input type="file" id="fileIn">
    <button id="uploadBtn">رفع المحتوى</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({apiKey: "AIzaSyBlIsEjPuyyp0VKgNffgu5StvSizata6Lo", projectId: "dental-core-2242b"}));

        window.loadSubjects = async () => {
            const year = document.getElementById('year').value;
            const sem = document.getElementById('sem').value;
            const subSelect = document.getElementById('subject');
            subSelect.innerHTML = "";
            const q = query(collection(db, "subjects"), where("year", "==", year), where("sem", "==", sem));
            const snapshot = await getDocs(q);
            snapshot.forEach(doc => {
                const opt = document.createElement('option');
                opt.value = doc.data().name;
                opt.innerHTML = doc.data().name;
                subSelect.appendChild(opt);
            });
        };

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const file = document.getElementById('fileIn').files[0];
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "dental_core");

            const res = await fetch("https://api.cloudinary.com/v1_1/nuuxgskn/upload", { method: "POST", body: formData });
            const data = await res.json();

            await addDoc(collection(db, "materials"), {
                year: document.getElementById('year').value,
                sem: document.getElementById('sem').value,
                subject: document.getElementById('subject').value,
                description: document.getElementById('desc').value,
                url: data.secure_url
            });
            alert("تم الرفع بنجاح يا دكتور!");
        });
    </script>
</body>
</html>
