<input type="file" id="fileInput"> <select id="year">
    <option value="Year1">السنة الأولى</option>
    <option value="Year2">السنة الثانية</option>
    </select>

<select id="semester">
    <option value="Sem1">الترم الأول</option>
    <option value="Sem2">الترم الثاني</option>
</select>

<input type="text" id="subject" placeholder="اسم المادة">

<select id="type">
    <option value="Lec">Lec</option>
    <option value="Lab">Lab</option>
</select>

<input type="number" id="number" placeholder="رقم المحاضرة أو المعمل (1-10)">

<button id="uploadBtn">رفع الملف</button>

<script type="module">
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const storage = getStorage();
    const db = getFirestore();

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const file = document.getElementById('fileInput').files[0];
        const fileName = `${document.getElementById('year').value}/${document.getElementById('subject').value}/${file.name}`;
        
        // 1. رفع الملف للمخزن
        const storageRef = ref(storage, fileName);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);

        // 2. حفظ تفاصيل الملف في قاعدة البيانات
        await addDoc(collection(db, "materials"), {
            year: document.getElementById('year').value,
            semester: document.getElementById('semester').value,
            subject: document.getElementById('subject').value,
            type: document.getElementById('type').value,
            number: document.getElementById('number').value,
            fileUrl: url
        });
        alert("تم الرفع بنجاح!");
    });
</script>
