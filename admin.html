<!-- admin.html -->
<select id="year" onchange="loadSubjects()">
    <option value="Year1">سنة أولى</option>
    <!-- كرر لباقي السنين -->
</select>
<select id="sem"><option value="Sem1">ترم أول</option><option value="Sem2">ترم ثاني</option></select>
<select id="subject"></select>
<select id="type"><option value="Lec">Lec</option><option value="Lab">Lab</option></select>
<select id="num"><script>for(let i=1; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script></select>

<input type="file" id="fileIn">
<button onclick="uploadContent()">إضافة المحتوى</button>

<script type="module">
    // كود الربط بـ Firebase و Cloudinary
    async function uploadContent() {
        const data = {
            year: document.getElementById('year').value,
            sem: document.getElementById('sem').value,
            subject: document.getElementById('subject').value,
            type: document.getElementById('type').value,
            number: document.getElementById('num').value,
            url: "رابط_الملف_من_Cloudinary" 
        };
        // إضافة لـ Firestore
        await addDoc(collection(db, "DentalCore_Materials"), data);
        alert("تمت الإضافة لـ Dental Core!");
    }
</script>
