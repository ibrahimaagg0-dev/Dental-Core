<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dental Core - Admin</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyBlIsEjPuyyp0VKgNffgu5StvSizata6Lo",
            projectId: "dental-core-2242b"
        }));

        // دالة الرفع
        window.uploadFile = async () => {
            const file = document.getElementById('fileIn').files[0];
            if (!file) return alert("من فضلك اختر ملفاً!");
            
            const btn = document.getElementById('uploadBtn');
            btn.innerText = "جاري الرفع...";
            btn.disabled = true;

            try {
                // 1. رفع الملف لـ Cloudinary
                const fd = new FormData();
                fd.append("file", file);
                fd.append("upload_preset", "dental_core");
                const res = await fetch("https://api.cloudinary.com/v1_1/nuuxgskn/upload", {method: "POST", body: fd});
                const data = await res.json();

                // 2. حفظ البيانات في Firebase
                await addDoc(collection(db, "materials"), {
                    year: document.getElementById('year').value,
                    sem: document.getElementById('sem').value,
                    subject: document.getElementById('subject').value,
                    type: document.getElementById('type').value,
                    number: document.getElementById('num').value,
                    url: data.secure_url,
                    timestamp: new Date()
                });

                alert("تم الرفع بنجاح يا دكتور إبراهيم!");
                btn.innerText = "إضافة إلى Dental Core";
                btn.disabled = false;
            } catch (e) {
                alert("حدث خطأ: " + e.message);
                btn.innerText = "إضافة إلى Dental Core";
                btn.disabled = false;
            }
        };
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .grid-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .field { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        select, input { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h2>لوحة تحكم Dental Core</h2>
    
    <div class="grid-row">
        <div class="field">
            <label>السنة</label>
            <select id="year" onchange="populateSubjects()"></select>
        </div>
        <div class="field">
            <label>الترم</label>
            <select id="sem"><option value="Sem1">الترم الأول</option><option value="Sem2">الترم الثاني</option></select>
        </div>
    </div>

    <div class="grid-row">
        <div class="field">
            <label>المادة</label>
            <select id="subject"></select>
        </div>
        <div class="field">
            <label>النوع (Lec/Lab)</label>
            <select id="type"><option value="Lec">Lec</option><option value="Lab">Lab</option></select>
        </div>
    </div>

    <div class="grid-row">
        <div class="field">
            <label>رقم المحاضرة (1-10)</label>
            <select id="num"><script>for(let i=1; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script></select>
        </div>
        <div class="field">
            <label>ملف المحتوى</label>
            <input type="file" id="fileIn">
        </div>
    </div>

    <button id="uploadBtn" onclick="uploadFile()">إضافة إلى Dental Core</button>
</div>

<script>
    const data = {
        "Year1": ["Dental Anatomy 1", "General Anatomy 1", "General Histology 1", "General Physiology 1", "Biochemistry 1", "Dental Anatomy 2", "General Anatomy 2", "General Histology 2", "General Physiology 2", "Biochemistry 2"],
        "Year2": ["Oral Histology 1", "Dental Biomaterials 1", "Pharmacology 1", "General Pathology 1", "Microbiology 1", "Oral Histology 2", "Dental Biomaterials 2", "Pharmacology 2", "General Pathology 2", "Microbiology 2", "Oral Pathology 1"],
        "Year3": ["Removable Prosthodontics 1", "Fixed Prosthodontics 1", "Operative Dentistry 1", "Oral Radiology 1", "Orthodontics 1", "Operative Dentistry 2", "Fixed Prosthodontics 2", "Removable Prosthodontics 2", "Oral Radiology 2", "Orthodontics 2", "Oral Pathology 3", "Oral Diagnosis"],
        "Year4": ["Operative Dentistry 3", "Fixed Prosthodontics 3", "Removable Prosthodontics 3", "Oral Medicine 1", "Endodontics 1", "Preventive Dentistry", "Oral Surgery 1", "Operative Dentistry 4", "Fixed Prosthodontics 4", "Removable Prosthodontics 4", "Oral Medicine 2", "Endodontics 2", "Oral Radiology 3", "Oral Surgery 2", "Periodontology 1"],
        "Year5": ["Operative Dentistry 5", "Fixed Prosthodontics 5", "Removable Prosthodontics 5", "Endodontics 3", "Oral Surgery 3", "Pediatric Dentistry 1", "Implantology 1", "Periodontology 2", "Operative Dentistry 6", "Fixed Prosthodontics 6", "Removable Prosthodontics 6", "Endodontics 4", "Oral Surgery 4", "Pediatric Dentistry 2", "Special Care Dentistry", "Implantology 2"]
    };

    function populateSubjects() {
        const year = document.getElementById('year').value;
        const subSelect = document.getElementById('subject');
        subSelect.innerHTML = "";
        data[year].forEach(sub => { subSelect.innerHTML += `<option value="${sub}">${sub}</option>`; });
    }

    const yearSelect = document.getElementById('year');
    Object.keys(data).forEach(y => yearSelect.innerHTML += `<option value="${y}">${y.replace('Year', 'سنة ')}</option>`);
    populateSubjects();
</script>
</body>
</html>
